name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/docs.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock httpx

          # Install proxy and ETL dependencies
          pip install fastapi>=0.104.0 pydantic>=2.0.0 aiohttp>=3.8.0 \
            python-dotenv>=1.0.0 uvicorn python-dateutil>=2.8.2 \
            filelock>=3.12.0 requests>=2.31.0 PyJWT>=2.8.0 \
            prometheus-client>=0.19.0 numpy

          # Optional deps (skip if unavailable)
          pip install qdrant-client 2>/dev/null || true
          pip install sentence-transformers 2>/dev/null || true
          pip install redis 2>/dev/null || true
          pip install langgraph 2>/dev/null || true

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select=E,F,W --ignore=E501

      - name: Run tests (proxy + ETL + tools)
        run: python -m pytest tests/proxy/ tests/etl/ tests/integration/ -v --tb=short --junitxml=test-results.xml -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
