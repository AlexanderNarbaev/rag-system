name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install proxy dependencies
        run: pip install -r proxy/requirements_proxy.txt

      - name: Install ETL dependencies
        run: pip install -r etl/requirements_etl.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov pytest-mock ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Typecheck with mypy
        run: mypy proxy/ etl/ --exclude '.venv|__pycache__'

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
