name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

          # Install lightweight proxy deps (fastapi, pydantic, aiohttp)
          pip install fastapi>=0.104.0 pydantic>=2.0.0 aiohttp>=3.8.0 \
            python-dotenv>=1.0.0 uvicorn python-dateutil>=2.8.2 \
            filelock>=3.12.0 requests>=2.31.0 PyJWT>=2.8.0 \
            prometheus-client>=0.19.0

          # Try installing optional deps, skip if not available
          pip install qdrant-client>=1.10.0 2>/dev/null || echo "qdrant-client not available"
          pip install sentence-transformers>=2.2.0 2>/dev/null || echo "sentence-transformers not available"
          pip install redis>=4.5.0 2>/dev/null || echo "redis not available"
          pip install langgraph 2>/dev/null || echo "langgraph not available"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
