version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - e2e_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - e2e_net

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - e2e_net

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      LLM_ENDPOINT: http://mock-llm:8000/v1
      LLM_MODEL_NAME: test-model
      REDIS_URL: redis://redis:6379
      USE_REDIS: "true"
      USE_LANGGRAPH: "false"
      AUTH_ENABLED: "true"
      JWT_SECRET: e2e-test-secret-key-do-not-use-in-production
      AUTH_VALID_USERS: '{"testuser":{"password":"testpass","user_id":"test-001","roles":["admin"],"groups":["engineering"],"access_level":"internal"}}'
      GRAPH_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      LOG_REQUESTS: "false"
      WARMUP_ENABLED: "false"
      METRICS_ENABLED: "false"
      GRACEFUL_SHUTDOWN_ENABLED: "true"
      SHUTDOWN_TIMEOUT: "5"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - e2e_net

volumes:
  qdrant_data:

networks:
  e2e_net:
    driver: bridge
