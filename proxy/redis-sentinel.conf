# Redis Sentinel configuration for HA docker-compose
# Used by sentinel-1, sentinel-2, sentinel-3 containers in docker-compose.ha.yml

# Monitor redis-master on port 6379, quorum = 2 out of 3 sentinels
sentinel monitor ragsystem-master redis-master 6379 2

# Master considered down after 5 seconds of unreachability
sentinel down-after-milliseconds ragsystem-master 5000

# Failover timeout: max 60 seconds for failover to complete
sentinel failover-timeout ragsystem-master 60000

# Number of replicas to reconfigure in parallel during failover
sentinel parallel-syncs ragsystem-master 1

# Require pass if Redis auth is enabled (uncomment and set if needed)
# sentinel auth-pass ragsystem-master ${REDIS_PASSWORD}

# Sentinel announce IP (for client discovery)
sentinel announce-ip redis-sentinel
