# docker-compose.yml
# Docker Compose for RAG proxy with infrastructure dependencies
# Start:   docker-compose up -d
# Stop:    docker-compose down

services:
  # ── Qdrant (vector database) ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC (optional)
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  # ── Neo4j (graph database) ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: rag-neo4j
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

  # ── Redis (cache) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - rag-network

  # ── LLM backend (OpenAI-compatible) ─────────────────────────────────────────
  # Set MODEL_PATH and MODEL_NAME in .env or override below
  vllm:
    image: vllm/vllm-openai:v0.6.6
    container_name: rag-vllm
    volumes:
      - ${MODEL_PATH:-/path/to/models}:/models:ro
    ports:
      - "8000:8000"
    environment:
      - HUGGINGFACE_HUB_CACHE=/models/cache
    command: >
      --model /models/${MODEL_FILE:-model.gguf}
      --api-key ${LLM_API_KEY:-}
      --port 8000
      --max-model-len ${LLM_MAX_MODEL_LEN:-65536}
      --tensor-parallel-size ${LLM_TP_SIZE:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - rag-network

  # ── RAG proxy (FastAPI) ─────────────────────────────────────────────────────
  rag-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: rag-proxy
    ports:
      - "8080:8080"
    volumes:
      - ${MODEL_CACHE_PATH:-/path/to/model_cache}:/app/cache:ro
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - LLM_ENDPOINT=http://vllm:8000/v1
      - USE_REDIS=true
      - USE_LANGGRAPH=true
      - GRAPH_ENABLED=true
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  rag-network:
    driver: bridge
