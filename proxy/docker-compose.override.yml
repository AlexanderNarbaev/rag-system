# proxy/docker-compose.override.yml
# Development overrides — use alongside docker-compose.yml:
#   docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# Mounts source code for hot reload, enables debug logging,
# exposes additional ports for debugging.

version: '3.8'

services:
  qdrant:
    ports:
      - "6333:6333"
    environment:
      - QDRANT__LOG_LEVEL=DEBUG

  redis:
    ports:
      - "6379:6379"

  rag-proxy:
    build:
      context: ..
      dockerfile: proxy/Dockerfile
    volumes:
      # Mount source code for hot reload (RELOAD=true required)
      - ../proxy/app:/app/app:ro
      - ../proxy/.env:/app/.env:ro
    environment:
      - RELOAD=true
      - LOG_REQUESTS=true
      - LOG_LEVEL=DEBUG
    ports:
      - "8080:8080"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --reload-dir /app/app
      --log-level debug

  hitl-dashboard:
    volumes:
      - ../logs:/app/logs
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_BROWSER_SERVER_ADDRESS=localhost
    ports:
      - "8501:8501"
