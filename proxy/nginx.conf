# RAG Proxy — Nginx reverse proxy with TLS termination
# Places in front of the FastAPI app (localhost:8080)

worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/rag-access.log json_combined;
    error_log /var/log/nginx/rag-error.log warn;

    # Security
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting zone — complements in-app rate limiter
    limit_req_zone $binary_remote_addr zone=rag_api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=rag_auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=rag_conn:10m;

    # Upstream backend
    upstream rag_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # HTTP → HTTPS redirect (when TLS is configured)
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS configuration
        ssl_certificate /etc/nginx/certs/rag-system.crt;
        ssl_certificate_key /etc/nginx/certs/rag-system.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Buffering
        client_body_buffer_size 128k;
        client_max_body_size 10m;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # Connection limits
        limit_conn rag_conn 10;

        # Health check — no auth, no rate limit
        location /v1/health {
            limit_req zone=rag_api burst=5 nodelay;
            proxy_pass http://rag_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
        }

        # Metrics — internal only
        location /metrics {
            limit_req zone=rag_api burst=5 nodelay;
            proxy_pass http://rag_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # Auth endpoints — stricter rate limit
        location /v1/auth/ {
            limit_req zone=rag_auth burst=3 nodelay;
            proxy_pass http://rag_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
        }

        # Chat completions — main endpoint
        location /v1/chat/completions {
            limit_req zone=rag_api burst=10 nodelay;
            proxy_pass http://rag_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # Other v1 endpoints
        location /v1/ {
            limit_req zone=rag_api burst=10 nodelay;
            proxy_pass http://rag_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Deny all other paths
        location / {
            return 404;
        }
    }
}
