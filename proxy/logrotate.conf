# RAG Proxy — Log rotation configuration
# Used by logrotate daemon (typically /etc/logrotate.d/rag-system)

# JSONL audit and interaction logs (100MB, keep 7 days)
/home/alexandr-narbaev/Projects/rag-system/logs/*.jsonl {
    daily
    rotate 7
    maxsize 100M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d
    create 0640 root root
    sharedscripts
    postrotate
        # Signal to the proxy to reopen log files (if file-based logging is used)
        # pkill -USR1 -f "uvicorn.*main:app" || true
    endscript
}

# Standard log files (50MB, keep 14 days)
/home/alexandr-narbaev/Projects/rag-system/logs/*.log {
    daily
    rotate 14
    maxsize 50M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d
    create 0640 root root
    sharedscripts
    postrotate
        # Signal to the proxy to reopen log files
        # pkill -USR1 -f "uvicorn.*main:app" || true
    endscript
}

# Nginx access and error logs (100MB, keep 30 days)
/var/log/nginx/rag-*.log {
    daily
    rotate 30
    maxsize 100M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}
