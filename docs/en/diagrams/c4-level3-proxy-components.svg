<text x="2834.00" y="96.75" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="2834.00" dy="16.00">FastAPI Router</tspan><tspan x="2834.00" dy="20.00">[main.py]</tspan><tspan x="2834.00" dy="20.00">HTTP handler, 3 endpoints:</tspan><tspan x="2834.00" dy="20.00">/v1/chat/completions</tspan><tspan x="2834.00" dy="20.00">/v1/models, /v1/health</tspan></text>
<text x="669.00" y="96.75" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="669.00" dy="16.00">Query Classifier</tspan><tspan x="669.00" dy="20.00">[slm_router.py]</tspan><tspan x="669.00" dy="20.00">Intent classification,</tspan><tspan x="669.00" dy="20.00">query decomposition,</tspan><tspan x="669.00" dy="20.00">SLM (Gemma-2B) routing</tspan></text>
<text x="1056.00" y="567.75" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="1056.00" dy="16.00">Hybrid Search</tspan><tspan x="1056.00" dy="20.00">[retrieval.py]</tspan><tspan x="1056.00" dy="20.00">Qdrant dense+sparse,</tspan><tspan x="1056.00" dy="20.00">RRF fusion, multi-collection</tspan></text>
<text x="1056.00" y="329.75" font-size="12" font-family="cursive" fill="#495057" text-anchor="middle" opacity="1.00"><tspan x="1056.00" dy="12.00">DB</tspan></text>
<text x="1492.00" y="358.75" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="1492.00" dy="16.00">Cross-Encoder Reranker</tspan><tspan x="1492.00" dy="20.00">[rerank.py]</tspan><tspan x="1492.00" dy="20.00">Reranks retrieved chunks</tspan><tspan x="1492.00" dy="20.00">by relevance scores</tspan></text>
<text x="1919.00" y="352.25" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="1919.00" dy="16.00">Context Builder</tspan><tspan x="1919.00" dy="20.00">[context_builder.py]</tspan><tspan x="1919.00" dy="20.00">Dedup, version resolution,</tspan><tspan x="1919.00" dy="20.00">context assembly for LLM</tspan></text>
<text x="2369.00" y="392.25" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="2369.00" dy="16.00">LLM Router</tspan><tspan x="2369.00" dy="20.00">[llm_router.py]</tspan><tspan x="2369.00" dy="20.00">Async streaming/non-streaming</tspan><tspan x="2369.00" dy="20.00">calls to vLLM (Gemma)</tspan></text>
<text x="2834.00" y="759.75" font-size="16" font-family="cursive" fill="#1e1e1e" text-anchor="middle" opacity="1.00"><tspan x="2834.00" dy="16.00">Cache Manager</tspan><tspan x="2834.00" dy="20.00">[cache.py]</tspan><tspan x="2834.00" dy="20.00">Redis + in-memory</tspan><tspan x="2834.00" dy="20.00">for embeddings &amp; responses</tspan></text>
