global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
  alert_relabel_configs: []
  alertmanager_config: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "rag-proxy"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:8080"
        labels:
          component: "proxy"
          environment: "production"

  - job_name: "qdrant"
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:6333"
        labels:
          component: "qdrant"
          environment: "production"

  - job_name: "redis-exporter"
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:9121"
        labels:
          component: "redis"
          environment: "production"

  - job_name: "neo4j"
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:2004"
        labels:
          component: "neo4j"
          environment: "production"

  - job_name: "prometheus"
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          component: "prometheus"
          environment: "production"
