# RAG System Alert Rules
groups:
  - name: rag_quality
    rules:
      - alert: HighNegativeRejectionRate
        expr: rate(rag_negative_rejection_total[5m]) / rate(rag_request_total[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High negative rejection rate"
          description: "More than 20% of requests are being rejected due to insufficient data"

      - alert: HighHallucinationRate
        expr: rate(rag_hallucination_detected_total[5m]) / rate(rag_request_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High hallucination rate"
          description: "More than 10% of responses contain hallucinations"

      - alert: LowFaithfulnessScore
        expr: avg(rag_faithfulness_score) < 0.7
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low RAGAS faithfulness score"
          description: "Average faithfulness score dropped below 0.7"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(rag_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "p95 latency exceeds 5 seconds"
