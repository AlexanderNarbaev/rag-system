groups:
  - name: rag_critical
    rules:
      # ── P1: Critical ──
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(rag_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(rag_requests_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
          component: proxy
        annotations:
          summary: "High 5xx error rate (> 1%)"
          description: "5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#high-error-rate"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(rag_request_duration_seconds_bucket[5m])) by (le)) > 10
        for: 5m
        labels:
          severity: critical
          component: proxy
        annotations:
          summary: "High p95 latency (> 10s)"
          description: "p95 request latency is {{ $value }}s over the last 5 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#high-latency"

      - alert: ServiceDown
        expr: up{job="rag-proxy"} == 0
        for: 1m
        labels:
          severity: critical
          component: proxy
        annotations:
          summary: "RAG proxy is down"
          description: "RAG proxy instance {{ $labels.instance }} has been unavailable for more than 1 minute."
          runbook_url: "docs/en/guides/operations-guide.md#service-down"

      - alert: QdrantUnavailable
        expr: up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: critical
          component: qdrant
        annotations:
          summary: "Qdrant vector store is unavailable"
          description: "Qdrant instance {{ $labels.instance }} has been unreachable for more than 2 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#qdrant-unavailable"

      - alert: LLMTimeout
        expr: |
          (
            sum(rate(rag_llm_duration_seconds_count[5m]))
            -
            sum(rate(rag_llm_duration_seconds_bucket{le="60.0"}[5m]))
          )
          /
          sum(rate(rag_llm_duration_seconds_count[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          component: llm
        annotations:
          summary: "LLM timeout rate > 5%"
          description: "{{ $value | humanizePercentage }} of LLM calls exceed 60 seconds over the last 5 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#llm-timeout"

  - name: rag_warning
    rules:
      # ── P2: Warning ──
      - alert: LowCacheHitRate
        expr: |
          (
            rate(rag_cache_hits_total[15m])
            /
            rate(rag_requests_total[15m])
          ) < 0.5
        for: 15m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "Cache hit rate < 50%"
          description: "Cache hit rate is {{ $value | humanizePercentage }} over the last 15 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#low-cache-hit-rate"

      - alert: HighMemoryUsage
        expr: |
          (
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          ) > 0.8
        for: 10m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "High memory usage (> 80%)"
          description: "System memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}."
          runbook_url: "docs/en/guides/operations-guide.md#high-memory-usage"

      - alert: HighDiskUsage
        expr: |
          (
            1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "High disk usage (> 85%)"
          description: "Disk usage on {{ $labels.instance }}:{{ $labels.mountpoint }} is {{ $value | humanizePercentage }}."
          runbook_url: "docs/en/guides/operations-guide.md#high-disk-usage"

      - alert: LowConfidenceRate
        expr: |
          rag_confidence_low_ratio > 0.3
        for: 15m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "Low confidence rate > 30%"
          description: "{{ $value | humanizePercentage }} of responses have confidence score < 0.5 over the last 15 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#low-confidence-rate"

      - alert: SlowReranking
        expr: |
          histogram_quantile(0.95, sum(rate(rag_rerank_duration_seconds_bucket[10m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "Slow reranking (p95 > 1s)"
          description: "p95 rerank latency is {{ $value }}s over the last 10 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#slow-reranking"

      - alert: HighTokenUsage
        expr: |
          rag_context_tokens > 8000
        for: 10m
        labels:
          severity: warning
          component: proxy
        annotations:
          summary: "High token usage per query"
          description: "Average context tokens per query is {{ $value }} (budget: 8000) over the last 10 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#high-token-usage"

      - alert: Neo4jUnavailable
        expr: up{job="neo4j"} == 0
        for: 10m
        labels:
          severity: warning
          component: neo4j
        annotations:
          summary: "Neo4j graph database unavailable"
          description: "Neo4j instance {{ $labels.instance }} has been unreachable for more than 10 minutes. Graph expansion is disabled."
          runbook_url: "docs/en/guides/operations-guide.md#neo4j-unavailable"

      - alert: RedisUnavailable
        expr: up{job="redis-exporter"} == 0 or redis_up == 0
        for: 5m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "Redis unavailable"
          description: "Redis instance {{ $labels.instance }} is not reachable. System has fallen back to in-memory cache."
          runbook_url: "docs/en/guides/operations-guide.md#redis-unavailable"

  - name: rag_info
    rules:
      # ── P3: Info ──
      - alert: NoRecentRequests
        expr: rate(rag_requests_total[30m]) == 0
        for: 1m
        labels:
          severity: info
          component: proxy
        annotations:
          summary: "No recent requests"
          description: "No RAG requests have been received in the last 30 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#no-recent-requests"

      - alert: ColdStorageNearLimit
        expr: |
          rag_cold_storage_versions >= 5
        for: 5m
        labels:
          severity: info
          component: proxy
        annotations:
          summary: "Cold storage near limit"
          description: "Cold storage version count is {{ $value }}, approaching the limit of {{ $labels.limit }}."
          runbook_url: "docs/en/guides/operations-guide.md#cold-storage-near-limit"

      - alert: BackupMissed
        expr: |
          time() - rag_last_backup_timestamp_seconds > 7200
        for: 1m
        labels:
          severity: info
          component: proxy
        annotations:
          summary: "Backup missed"
          description: "Last backup was {{ $value | humanizeDuration }} ago (threshold: 2 hours)."
          runbook_url: "docs/en/guides/operations-guide.md#backup-missed"

      - alert: HighActiveRequests
        expr: rag_active_requests > 50
        for: 5m
        labels:
          severity: info
          component: proxy
        annotations:
          summary: "High number of active requests"
          description: "{{ $value }} concurrent requests are being processed."
          runbook_url: "docs/en/guides/operations-guide.md#high-active-requests"

      - alert: QdrantHighDiskUsage
        expr: |
          qdrant_collection_info_disk_usage_bytes / 1e9 > 50
        for: 10m
        labels:
          severity: info
          component: qdrant
        annotations:
          summary: "Qdrant high disk usage"
          description: "Qdrant collection disk usage is {{ $value }} GB on {{ $labels.instance }}."
          runbook_url: "docs/en/guides/operations-guide.md#qdrant-high-disk-usage"

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 10m
        labels:
          severity: info
          component: redis
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}."
          runbook_url: "docs/en/guides/operations-guide.md#redis-high-memory"

      - alert: LLMRequestBacklog
        expr: |
          rag_active_requests > 10
        for: 10m
        labels:
          severity: info
          component: llm
        annotations:
          summary: "LLM request backlog building"
          description: "{{ $value }} active requests sustained for more than 10 minutes."
          runbook_url: "docs/en/guides/operations-guide.md#llm-request-backlog"

      - alert: QdrantVectorGrowth
        expr: |
          deriv(qdrant_collection_vectors_total[1h]) > 10000
        for: 1h
        labels:
          severity: info
          component: qdrant
        annotations:
          summary: "High vector ingestion rate"
          description: "Qdrant vectors are growing at {{ $value }}/hour on {{ $labels.instance }}."
          runbook_url: "docs/en/guides/operations-guide.md#qdrant-vector-growth"
