# docker-compose.monitoring.yml
# Standalone monitoring stack for RAG System
# Start:   docker compose -f docker-compose.monitoring.yml up -d
# Stop:    docker compose -f docker-compose.monitoring.yml down
#
# The RAG proxy must be running separately on the same Docker network
# (rag-network) or accessible via host.docker.internal.

services:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rag-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: rag-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/rag-overview.json
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - monitoring

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: rag-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://rag-redis:6379
    restart: unless-stopped
    networks:
      - rag-network
      - monitoring

  # ── Neo4j Exporter ──────────────────────────────────────────────────────────
  neo4j-exporter:
    image: neo4j/neo4j-prometheus-exporter:latest
    container_name: rag-neo4j-exporter
    ports:
      - "2004:2004"
    environment:
      - NEO4J_URI=bolt://rag-neo4j:7687
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    restart: unless-stopped
    networks:
      - rag-network
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  # Connects to the existing RAG network for scraping proxy/Qdrant/Redis/Neo4j
  rag-network:
    external: true
  # Internal network for monitoring components
  monitoring:
    driver: bridge
