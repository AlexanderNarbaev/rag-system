apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-system.fullname" . }}-proxy-secrets
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "rag-system.proxyLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.CHANGE_ME }}
  NEO4J_PASSWORD: {{ .Values.secrets.CHANGE_ME | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtPublicKey }}
  JWT_PUBLIC_KEY: {{ .Values.secrets.jwtPublicKey | quote }}
  {{- end }}
  {{- if .Values.secrets.llmApiKey }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.slmApiKey }}
  SLM_API_KEY: {{ .Values.secrets.slmApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.embedderApiKey }}
  EMBEDDER_API_KEY: {{ .Values.secrets.embedderApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.rerankerApiKey }}
  RERANKER_API_KEY: {{ .Values.secrets.rerankerApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.authValidUsers }}
  AUTH_VALID_USERS: {{ .Values.secrets.authValidUsers | quote }}
  {{- end }}
  {{- if .Values.secrets.confluenceApiToken }}
  CONFLUENCE_API_TOKEN: {{ .Values.secrets.confluenceApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.jiraApiToken }}
  JIRA_API_TOKEN: {{ .Values.secrets.jiraApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.gitlabApiToken }}
  GITLAB_API_TOKEN: {{ .Values.secrets.gitlabApiToken | quote }}
  {{- end }}
