apiVersion: v1
kind: Secret
metadata:
  name: { { include "rag-system.fullname" . } }-proxy-secrets
  namespace: { { .Values.global.namespace | default .Release.Namespace } }
  labels:
    { { - include "rag-system.proxyLabels" . | nindent 4 } }
type: Opaque
stringData:
  { { - if .Values.secrets.neo4jPassword } }
  NEO4J_PASSWORD: { { .Values.secrets.neo4jPassword | quote } }
  { { - end } }
  { { - if .Values.secrets.jwtSecret } }
  JWT_SECRET: { { .Values.secrets.jwtSecret | quote } }
  { { - end } }
  { { - if .Values.secrets.jwtPublicKey } }
  JWT_PUBLIC_KEY: { { .Values.secrets.jwtPublicKey | quote } }
  { { - end } }
  { { - if .Values.secrets.llmApiKey } }
  LLM_API_KEY: { { .Values.secrets.llmApiKey | quote } }
  { { - end } }
  { { - if .Values.secrets.slmApiKey } }
  SLM_API_KEY: { { .Values.secrets.slmApiKey | quote } }
  { { - end } }
  { { - if .Values.secrets.authValidUsers } }
  AUTH_VALID_USERS: { { .Values.secrets.authValidUsers | quote } }
  { { - end } }
