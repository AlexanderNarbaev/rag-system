{{- if .Values.neo4j.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rag-system.fullname" . }}-neo4j
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "rag-system.neo4jLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "rag-system.fullname" . }}-neo4j
  replicas: {{ .Values.neo4j.replicaCount }}
  selector:
    matchLabels:
      {{- include "rag-system.neo4jSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-system.neo4jLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.neo4j.podSecurityContext | nindent 8 }}
      containers:
        - name: neo4j
          securityContext:
            {{- toYaml .Values.neo4j.securityContext | nindent 12 }}
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: {{ .Values.neo4j.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.neo4j.service.httpPort }}
              protocol: TCP
            - name: bolt
              containerPort: {{ .Values.neo4j.service.boltPort }}
              protocol: TCP
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "rag-system.fullname" . }}-proxy-secrets
                  key: NEO4J_PASSWORD
                  optional: true
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: {{ .Values.neo4j.acceptLicenseAgreement | quote }}
            - name: NEO4J_dbms_memory_pagecache_size
              value: {{ .Values.neo4j.pagecacheSize | quote }}
            - name: NEO4J_dbms_memory_heap_initial__size
              value: {{ .Values.neo4j.heapInitialSize | quote }}
            - name: NEO4J_dbms_memory_heap_max__size
              value: {{ .Values.neo4j.heapMaxSize | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          {{- with .Values.neo4j.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.neo4j.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.neo4j.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          {{- if eq .Values.neo4j.podAntiAffinity.type "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - neo4j
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - neo4j
                topologyKey: kubernetes.io/hostname
          {{- end }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "rag-system.neo4jLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.neo4j.persistence.accessMode }}
        {{- if .Values.neo4j.persistence.storageClass }}
        storageClassName: {{ .Values.neo4j.persistence.storageClass }}
        {{- else if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
{{- end }}

---
{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-system.fullname" . }}-neo4j
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "rag-system.neo4jLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.neo4j.service.httpPort }}
      targetPort: {{ .Values.neo4j.service.httpPort }}
      protocol: TCP
    - name: bolt
      port: {{ .Values.neo4j.service.boltPort }}
      targetPort: {{ .Values.neo4j.service.boltPort }}
      protocol: TCP
  selector:
    {{- include "rag-system.neo4jSelector" . | nindent 4 }}
{{- end }}
