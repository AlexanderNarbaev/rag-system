# docker-compose.openwebui.yml
# OpenWebUI + RAG Proxy + MinIO
# Start:   docker compose -f docker-compose.openwebui.yml up -d
# Stop:    docker compose -f docker-compose.openwebui.yml down

services:
  # ── OpenWebUI ───────────────────────────────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rag-openwebui
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Подключение к RAG Proxy как к OpenAI-compatible backend
      - OPENAI_API_BASE_URLS=http://rag-proxy:8080/v1
      - OPENAI_API_KEYS=${OPENWEBUI_API_KEY:-sk-rag-proxy}
      - DEFAULT_MODELS=rag
      # Отключаем встроенный RAG (используем наш)
      - RAG_ENABLED=false
      # MinIO для файлов
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - S3_BUCKET_NAME=${MINIO_DOCS_BUCKET:-open-webui}
      # Auth
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
    depends_on:
      rag-proxy:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/auths" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

  # ── RAG Proxy ───────────────────────────────────────────────────────────────
  rag-proxy:
    image: rag-proxy:latest
    container_name: rag-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./proxy/logs:/app/logs
      - ./proxy/.env:/app/.env:ro
    env_file:
      - ./proxy/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - rag-network

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  qdrant_data:
  redis_data:
  minio_data:
  openwebui_data:

networks:
  rag-network:
    driver: bridge
