# deploy/nginx/ssl.conf
# TLS configuration for nginx reverse proxy
# Enforces TLS 1.2+ with strong cipher suites

# ── Protocol versions ─────────────────────────────────────────────────────────
# TLS 1.2 minimum — TLS 1.0 and 1.1 are disabled
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher suites ─────────────────────────────────────────────────────────────
# Strong ciphers only, preferring ECDHE for Perfect Forward Secrecy
# TLS 1.3 ciphers are configured automatically by OpenSSL
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Prefer server cipher order
ssl_prefer_server_ciphers on;

# ── Session configuration ─────────────────────────────────────────────────────
# Session caching for performance
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ── OCSP Stapling ─────────────────────────────────────────────────────────────
# Enable OCSP stapling for certificate revocation checking
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ── DH parameters (for DHE ciphers) ──────────────────────────────────────────
# Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ── Early data (0-RTT) ───────────────────────────────────────────────────────
# Disable 0-RTT to prevent replay attacks
ssl_early_data off;

# ── Buffer size optimization ──────────────────────────────────────────────────
ssl_buffer_size 4k;
