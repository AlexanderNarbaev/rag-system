# deploy/haproxy/ssl.conf
# TLS configuration notes for HAProxy
# 
# HAProxy uses bind options and global settings for TLS configuration.
# This file documents the TLS settings and provides reference configuration.

# ── TLS Protocol Configuration ────────────────────────────────────────────────
# HAProxy enforces TLS 1.2+ via ssl-default-bind-options in haproxy.cfg:
#
#   ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
#
# This disables:
#   - SSLv3 (POODLE vulnerability)
#   - TLS 1.0 (BEAST vulnerability)
#   - TLS 1.1 (deprecated)
#
# TLS 1.3 is supported and preferred when available.

# ── Cipher Suite Configuration ────────────────────────────────────────────────
# Strong ciphers only, configured in haproxy.cfg:
#
#   ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:...
#   ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:...
#
# Cipher selection criteria:
#   - AEAD only (GCM, CHACHA20-POLY1305)
#   - ECDHE for Perfect Forward Secrecy (PFS)
#   - No RSA key exchange (vulnerable to Bleichenbacher)
#   - No CBC mode (vulnerable to padding oracle attacks)
#   - No MD5, SHA1 for MAC (use SHA256+)

# ── Certificate Configuration ─────────────────────────────────────────────────
# HAProxy expects PEM file containing both certificate and private key:
#
#   cat server.crt server.key > server.pem
#   chmod 600 server.pem
#
# Mount the PEM file to: /etc/haproxy/ssl/server.pem

# ── Session Ticket Configuration ──────────────────────────────────────────────
# TLS session tickets are disabled for security:
#
#   ssl-default-bind-options ... no-tls-tickets
#
# Session tickets can leak forward secrecy if ticket keys are compromised.
# For load-balanced setups, use shared session cache instead.

# ── OCSP Stapling ─────────────────────────────────────────────────────────────
# HAProxy 2.6+ supports OCSP stapling:
#
#   ssl-default-bind-options ... ssl-min-ver TLSv1.2
#
# OCSP response files should be placed alongside the PEM:
#   /etc/haproxy/ssl/server.pem.ocsp

# ── Certificate Rotation ──────────────────────────────────────────────────────
# HAProxy supports runtime certificate updates via stats socket:
#
#   echo "set ssl cert /etc/haproxy/ssl/server.pem < server.pem.new" | \
#     socat stdio /var/run/haproxy.sock
#   echo "commit ssl cert /etc/haproxy/ssl/server.pem" | \
#     socat stdio /var/run/haproxy.sock
#
# This allows zero-downtime certificate rotation.

# ── Mutual TLS (mTLS) Configuration ──────────────────────────────────────────
# For client certificate verification:
#
#   frontend https_front
#     bind *:443 ssl crt /etc/haproxy/ssl/server.pem ca-file /etc/haproxy/ssl/ca.crt verify optional
#
#   acl valid_client ssl_c_verify 0
#   http-request deny unless valid_client

# ── DH Parameters ─────────────────────────────────────────────────────────────
# HAProxy 2.2+ supports custom DH parameters:
#
#   ssl-dh-param-file /etc/haproxy/ssl/dhparam.pem
#
# Generate with: openssl dhparam -out dhparam.pem 2048

# ── SSL Offloading vs. End-to-End ────────────────────────────────────────────
# This configuration uses SSL offloading:
#   Client -> HTTPS -> HAProxy -> HTTP -> Backend
#
# For end-to-end encryption:
#   Client -> HTTPS -> HAProxy -> HTTPS -> Backend
#
# End-to-end requires backend SSL config:
#   backend rag_proxy
#     server rag-proxy rag-proxy:8080 ssl verify required ca-file /etc/haproxy/ssl/ca.crt
