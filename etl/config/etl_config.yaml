# etl/config/etl_config.yaml
# Конфигурация ETL-пайплайна для RAG-системы
# Замените значения на реальные для вашей инфраструктуры

# Общие настройки
global:
  timeout: 120                             # глобальный таймаут чтения (сек) — увеличен для больших инстансов
  connect_timeout: 30                      # таймаут подключения (сек)
  max_retries: 5                           # максимальное количество повторов
  retry_delay: 5                           # задержка между повторами (сек)

# Общие настройки WAL (единая точка контроля прогресса)
wal:
  wal_file: "./wal/etl_wal.json"        # путь к файлу WAL
  use_lock: true                         # использовать файловую блокировку
  lock_timeout: 30                       # таймаут блокировки (сек)

# Confluence (Self-Hosted)
confluence:
  url: "https://confluence.internal.company.com"
  username: ""                             # оставьте пустым для Bearer token auth
  token: "your_personal_access_token"      # Bearer токен (или пароль с username)
  verify_ssl: false                        # false для самоподписанных сертификатов
  ca_bundle: ""                            # путь к корпоративному CA bundle (e.g. /etc/ssl/certs/company.pem)
  space_keys:                              # список ключей пространств (None = все)
    - "DEV"
    - "OPS"
    - "QA"
  output_dir: "./raw_data/confluence"
  incremental: true
  download_attachments: true
  max_versions: 0                          # 0 = все версии
  api_version: "2"                         # "2" или "1"

# Jira (Self-Hosted)
jira:
  url: "https://jira.internal.company.com"
  username: ""                             # оставьте пустым для Bearer token auth
  token: "your_api_token"                  # Bearer токен (или пароль с username)
  verify_ssl: false                        # false для самоподписанных сертификатов
  ca_bundle: ""                            # путь к корпоративному CA bundle
  jql: "project in (DEV, OPS) ORDER BY updated DESC"
  output_dir: "./raw_data/jira"
  incremental: true
  download_attachments: true
  max_issues_per_run: 0                    # 0 = без ограничений
  fields: "*all"
  expand: "changelog,renderedBody"

# GitLab (Self-Hosted)
gitlab:
  url: "https://gitlab.internal.company.com"
  token: "your_personal_access_token"
  verify_ssl: false                        # false для самоподписанных сертификатов
  ca_bundle: ""                            # путь к корпоративному CA bundle
  project_ids: null                        # null = все проекты, либо список [1,2,3]
  output_dir: "./raw_data/gitlab"
  incremental: true
  fetch_commits: true
  fetch_files: true
  fetch_merge_requests: true
  max_commits_per_project: 1000            # ограничение для больших репозиториев
  since_date: null                         # ISO дата, например "2025-01-01T00:00:00Z"
  file_paths_filter:                       # фильтр файлов для индексации кода
    - "*.py"
    - "*.md"
    - "Dockerfile"
    - "*.yaml"
    - "*.yml"
    - "*.sql"

# Семантический чанкинг
chunking:
  max_tokens: 8000                       # максимальный размер чанка (для эмбеддера)
  overlap_tokens: 200                    # перекрытие между чанками
  min_chunk_tokens: 100                  # минимальный размер чанка (будет объединён)
  use_slm: false                         # использовать SLM для обогащения (требуется эндпоинт)
  slm_endpoint: "http://localhost:8080/v1/completions"  # если use_slm true
  output_dir: "./chunks"                 # директория для сохранения чанков (JSON)

# Гибридная индексация Qdrant
indexing:
  qdrant_host: "localhost"
  qdrant_port: 6333
  collection_name: "knowledge_base"
  embedder_model: ""                      # REQUIRED — e.g. BAAI/bge-m3
  embedder_device: "cpu"                 # или "cuda"
  batch_size: 100
  hot_dir: "./hot_chunks"                # горячее хранилище чанков (текущие версии)
  cold_dir: "./cold_chunks"              # холодное хранилище (история Parquet)
  lake_dir: "./cold_lake"                # LiveVectorLake cold storage
  use_delta: false                       # использовать Delta Lake (требуется deltalake)
  version_wal: "./wal/version_wal.json"  # WAL для версионирования чанков
  live_upsert_enabled: true               # Enable atomic chunk-level upserts (no full reindex)

# Streaming ETL (Redis Streams) — real-time webhook-driven ingestion
streaming:
  streaming_enabled: false                  # Enable real-time streaming mode
  webhook_enabled: true                     # Enable webhook server
  webhook_host: "0.0.0.0"
  webhook_port: 9000
  webhook_secret: ""                        # REQUIRED — shared secret for HMAC validation
  redis_host: "localhost"
  redis_port: 6379
  redis_stream_key: "etl:events"
  redis_consumer_group: "etl-workers"

# Schedule settings (for cron-based or periodic ETL runs)
schedule:
  enabled: false                            # Enable scheduled ETL runs
  cron_expression: "0 2 * * *"              # Default: daily at 02:00
  timezone: "UTC"                           # Schedule timezone
  retry_on_failure: true                    # Retry failed extraction stages
  max_retries: 3                            # Maximum retries per stage
  notify_on_failure: true                   # Log/notify on pipeline failure

# Граф знаний (Neo4j) – опционально
graph:
  enabled: false                         # включить построение графа
  use_spacy: true                        # использовать spaCy для NER
  spacy_model: ""                         # REQUIRED — e.g. ru_core_news_sm, en_core_web_sm
  use_slm: false                         # использовать SLM для извлечения отношений
  slm_endpoint: "http://localhost:8080/v1/completions"
  cache_dir: "./entity_cache"            # кэш сущностей
  neo4j:
    enabled: false
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: "your_neo4j_password"
    database: "neo4j"

# SSL / TLS — корпоративные сертификаты
# В корпоративных средах часто используются самоподписанные сертификаты
# или перехват TLS (SSL inspection). Настройте здесь.
ssl:
  verify: true                           # false — отключить проверку сертификатов (НЕ для production)
  cert_path: ""                          # путь к корпоративному CA bundle (e.g. /etc/ssl/certs/corporate.pem)