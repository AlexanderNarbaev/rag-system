# Default values for rag-system Helm chart.
# This is a YAML-formatted file documenting configurable parameters.

# -- Override the name of the chart
nameOverride: ""
# -- Override the fully qualified app name
fullnameOverride: ""

# =============================================================================
# Global configuration
# =============================================================================
global:
  # -- Docker image registry
  imageRegistry: ""
  # -- Image pull secrets
  imagePullSecrets: []
  # -- Storage class for PVCs (empty = default StorageClass)
  storageClass: ""
  # -- Namespace all resources are deployed into
  namespace: ""

# =============================================================================
# RAG Proxy — FastAPI application
# =============================================================================
proxy:
  # -- Number of proxy replicas (start with 2 for HA)
  replicaCount: 2

  image:
    # -- Proxy image repository
    repository: rag-system/proxy
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (overrides appVersion)
    tag: ""

  # -- Image pull secrets for the proxy container
  imagePullSecrets: []

  # -- Additional pod annotations
  podAnnotations: {}
  # -- Additional pod labels
  podLabels: {}

  # Pod security context
  podSecurityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000

  # Container security context
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false

  service:
    # -- Service type (ClusterIP for internal, LoadBalancer for external)
    type: ClusterIP
    # -- Service port
    port: 8080
    # -- Target port on container
    targetPort: 8080

  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 2Gi

  # -- liveness probe: checks the app is alive
  livenessProbe:
    httpGet:
      path: /v1/health/live
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  # -- readiness probe: checks dependencies (Qdrant, LLM) are reachable
  readinessProbe:
    httpGet:
      path: /v1/health/ready
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # -- HPA configuration
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    # -- Average CPU utilization percentage across pods
    targetCPUUtilizationPercentage: 70
    # -- Average memory utilization percentage across pods (optional)
    targetMemoryUtilizationPercentage: ~

  # -- Pod topology spread constraints
  podAntiAffinity:
    enabled: true
    # -- soft = preferredDuringScheduling, hard = requiredDuringScheduling
    type: soft

  # Environment variables injected from config values
  env:
    # -- Qdrant host (usually the service name)
    qdrantHost: ""
    # -- Qdrant port
    qdrantPort: "6333"
    # -- Qdrant collection name
    collectionName: "knowledge_base"
    # -- Embedder model name (e.g. BAAI/bge-m3)
    embedderModel: ""
    # -- Embedder device (cpu or cuda)
    embedderDevice: "cpu"
    # -- Reranker model name (e.g. cross-encoder/ms-marco-MiniLM-L-6-v2)
    rerankerModel: ""
    # -- Reranker max input length
    rerankerMaxLength: "512"
    # -- Reranker batch size
    rerankerBatchSize: "32"
    # -- LLM endpoint URL
    llmEndpoint: ""
    # -- LLM model name
    llmModelName: ""
    # -- LLM API key (also set via secrets)
    llmApiKey: ""
    # -- LLM provider type (openai, generic)
    llmProviderType: "openai"
    # -- Request timeout for LLM calls (seconds)
    requestTimeout: "120"
    # -- Max retries for LLM calls
    maxRetries: "3"
    # -- Delay between retries (seconds)
    retryDelay: "1.0"
    # -- SLM endpoint (leave empty to disable SLM)
    slmEndpoint: ""
    # -- SLM model name
    slmModelName: ""
    # -- SLM API key
    slmApiKey: ""
    # -- Max tokens for SLM responses
    slmMaxTokens: "256"
    # -- Max chunks to retrieve
    maxChunksRetrieval: "50"
    # -- Max chunks after reranking
    maxChunksAfterRerank: "20"
    # -- Enable Redis cache
    useRedis: "false"
    # -- Enable LangGraph orchestration
    useLangGraph: "false"
    # -- Max retrieval loops for agentic mode
    maxRetrievalLoops: "3"
    # -- Enable Neo4j graph knowledge base
    graphEnabled: "false"
    # -- Neo4j URI
    neo4jUri: ""
    # -- Enable graph expansion in RAG pipeline
    useGraphExpansion: "false"
    # -- Enable request logging
    logRequests: "true"
    # -- Log directory path
    logDir: "/app/logs"
    # -- Enable Prometheus metrics
    metricsEnabled: "true"
    # -- Log format (text or json)
    logFormat: "text"
    # -- Enable rate limiting
    rateLimitEnabled: "false"
    # -- Rate limit per minute per IP
    rateLimitPerMinute: "60"
    # -- Rate limit burst
    rateLimitBurst: "10"
    # -- CORS allowed origins
    corsOrigins: "*"
    # -- Enable JWT authentication
    authEnabled: "false"
    # -- JWT signing algorithm
    jwtAlgorithm: "HS256"
    # -- Token expiry hours
    tokenExpireHours: "24"
    # -- Enable RBAC
    rbacEnabled: "false"
    # -- Keycloak URL (OIDC)
    keycloakUrl: ""
    # -- Keycloak realm
    keycloakRealm: "master"
    # -- Keycloak client ID
    keycloakClientId: "rag-proxy"
    # -- Enable input sanitization
    sanitizeInput: "true"
    # -- Enable audit logging
    auditEnabled: "true"
    # -- Enable namespace isolation
    namespaceIsolationEnabled: "false"
    # -- Enable A/B testing
    abTestEnabled: "false"
    # -- Confidence threshold (0.0-1.0)
    confidenceThreshold: "0.5"
    # -- Enable NLI grounding
    nliGroundingEnabled: "true"
    # -- Enable self-critique
    selfCritiqueEnabled: "true"
    # -- Compression strategy (perplexity, keyword, none)
    compressionStrategy: "keyword"
    # -- Enable LongContextReorder
    reorderEnabled: "true"
    # -- Enable CRAG decomposition
    cragDecompositionEnabled: "true"
    # -- Enable NLI model
    nliModelEnabled: "false"
    # -- Enable self-enrichment
    enrichmentEnabled: "false"
    # -- Enable multi-modal RAG
    multiModalEnabled: "true"
    # -- Enable ColBERT
    colbertEnabled: "true"
    # -- Image model name
    imageModel: "clip-ViT-B-32"
    # -- Enable image extraction
    imageExtractionEnabled: "false"
    # -- AST languages for code chunking (comma-separated)
    astLanguages: "python,javascript,java"
    # -- Enable table extraction
    tableExtractionEnabled: "false"
    # -- Enable code chunking
    codeChunkingEnabled: "false"
    # -- Max versions in cold storage
    coldStorageMaxVersions: "5"
    # -- Enable reranker fine-tuning
    rerankerFtEnabled: "false"
    # -- Enable token optimizer
    tokenOptimizerEnabled: "true"
    # -- Enable vLLM prefix caching
    prefixCachingEnabled: "false"
    # -- Eval dataset path
    evalDatasetPath: "./data/eval_dataset.json"
    # -- Enable dependency scanning
    dependencyScanEnabled: "false"
    # -- Enable admin alerts
    adminAlertEnabled: "false"
    # -- Admin alert endpoint
    adminAlertEndpoint: ""
    # -- Enable response compression (gzip/brotli)
    compressionEnabled: "true"
    # -- Minimum response size for compression (bytes)
    compressionMinSize: "500"
    # -- Compression level (1-9)
    compressionLevel: "6"
    # -- SSE chunk size
    sseChunkSize: "4"
    # -- Stream buffer size
    streamBufferSize: "1"
    # -- Enable model warm-up
    warmupEnabled: "true"
    # -- Run warm-up on startup
    warmupOnStartup: "true"
    # -- Server host
    host: "0.0.0.0"
    # -- Server port
    port: "8080"
    # -- Enable auto-reload (dev only)
    reload: "false"
    # -- Number of uvicorn workers
    workers: "1"

# =============================================================================
# Qdrant — Vector database (StatefulSet)
# =============================================================================
qdrant:
  # -- Enable Qdrant deployment
  enabled: true

  image:
    # -- Qdrant image repository
    repository: qdrant/qdrant
    # -- Image tag
    tag: "latest"
    # -- Image pull policy
    pullPolicy: IfNotPresent

  # -- Number of replicas in StatefulSet
  replicaCount: 1

  # Pod security context
  podSecurityContext:
    fsGroup: 1000

  # Container security context
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  service:
    # -- HTTP API port
    port: 6333
    # -- gRPC port
    grpcPort: 6334

  persistence:
    # -- Enable persistent storage
    enabled: true
    # -- Storage class name (empty = default)
    storageClass: ""
    # -- PVC access mode
    accessMode: ReadWriteOnce
    # -- PVC size
    size: 50Gi
    # -- Reclaim policy (Retain, Delete)
    reclaimPolicy: Retain

  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "500m"
      memory: 1Gi

  # -- Pod topology spread constraints
  podAntiAffinity:
    enabled: false
    type: soft

# =============================================================================
# Neo4j — Graph database (StatefulSet)
# =============================================================================
neo4j:
  # -- Enable Neo4j deployment
  enabled: true

  image:
    # -- Neo4j image repository
    repository: neo4j
    # -- Neo4j edition: 5-enterprise or 5-community
    tag: "5-enterprise"
    # -- Image pull policy
    pullPolicy: IfNotPresent

  # -- Number of replicas (1 for community, 3+ for enterprise cluster)
  replicaCount: 1

  # Pod security context
  podSecurityContext:
    fsGroup: 7474

  # Container security context
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  service:
    # -- HTTP browser port
    httpPort: 7474
    # -- Bolt protocol port
    boltPort: 7687

  persistence:
    # -- Enable persistent storage
    enabled: true
    # -- Storage class name (empty = default)
    storageClass: ""
    # -- PVC access mode
    accessMode: ReadWriteOnce
    # -- PVC size for data
    size: 20Gi
    # -- Reclaim policy (Retain, Delete)
    reclaimPolicy: Retain

  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "500m"
      memory: 2Gi

  # -- Accept Neo4j enterprise license
  acceptLicenseAgreement: "yes"
  # -- Page cache size (e.g. 1G)
  pagecacheSize: "1G"
  # -- Heap initial size (e.g. 1G)
  heapInitialSize: "1G"
  # -- Heap max size (e.g. 2G)
  heapMaxSize: "2G"

  # -- Pod topology spread constraints
  podAntiAffinity:
    enabled: false
    type: soft

# =============================================================================
# Redis — Cache (Deployment)
# =============================================================================
redis:
  # -- Enable Redis deployment
  enabled: true

  image:
    # -- Redis image repository
    repository: redis
    # -- Image tag (7-alpine for minimal footprint)
    tag: "7-alpine"
    # -- Image pull policy
    pullPolicy: IfNotPresent

  # -- Number of replicas
  replicaCount: 1

  # Pod security context
  podSecurityContext:
    fsGroup: 999

  # Container security context
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  service:
    # -- Redis port
    port: 6379

  persistence:
    # -- Enable persistent storage
    enabled: true
    # -- Storage class name (empty = default)
    storageClass: ""
    # -- PVC access mode
    accessMode: ReadWriteOnce
    # -- PVC size
    size: 10Gi

  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: "100m"
      memory: 256Mi

  # -- Redis command arguments
  args: "--appendonly yes --maxmemory-policy allkeys-lru"

  # -- Pod topology spread constraints
  podAntiAffinity:
    enabled: false
    type: soft

# =============================================================================
# Ingress
# =============================================================================
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name (e.g. nginx, traefik)
  className: "nginx"
  # -- Additional annotations (e.g. cert-manager)
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  # -- TLS configuration
  tls:
    enabled: false
    # -- Secret name holding TLS cert and key
    secretName: rag-system-tls
    # -- Hosts covered by the TLS certificate
    hosts:
      - rag.example.com
  hosts:
    # -- Primary hostname
    - host: rag.example.com
      paths:
        # Proxy API (chat completions, models, health, feedback, auth)
        - path: /v1/
          pathType: Prefix
          serviceName: proxy
          servicePort: 8080
        # Prometheus metrics
        - path: /metrics
          pathType: Exact
          serviceName: proxy
          servicePort: 8080

# =============================================================================
# Secrets (do NOT commit real values — use --set or sealed-secrets)
# =============================================================================
secrets:
  # -- Neo4j password for authentication
  neo4jPassword: ""
  # -- JWT secret for token signing (at least 32 characters)
  jwtSecret: ""
  # -- JWT public key for asymmetric verification
  jwtPublicKey: ""
  # -- Auth valid users as JSON: '{"admin":"password","expert":"password"}'
  authValidUsers: "{}"
  # -- LLM API key
  llmApiKey: ""
  # -- SLM API key
  slmApiKey: ""

# =============================================================================
# Service account
# =============================================================================
serviceAccount:
  # -- Create service account
  create: true
  # -- Service account name (empty = fullname)
  name: ""
  # -- Service account annotations
  annotations: {}
  # -- Service account automount token
  automount: true

# =============================================================================
# Pod disruption budgets
# =============================================================================
podDisruptionBudget:
  # -- Enable PDB for proxy
  enabled: false
  # -- Min available pods
  minAvailable: 1
  # -- Max unavailable pods (mutually exclusive with minAvailable)
  maxUnavailable: ~

# =============================================================================
# Network policies
# =============================================================================
networkPolicy:
  # -- Enable network policies
  enabled: false

# =============================================================================
# Node selector, tolerations, affinity
# =============================================================================
# -- Node selector for all pods
nodeSelector: {}

# -- Tolerations for all pods
tolerations: []

# -- Affinity rules for all pods
affinity: {}
