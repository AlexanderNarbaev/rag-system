{{- if and .Values.modelEvolution.enabled .Values.modelEvolution.training.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "rag-system.fullname" . }}-train-{{ .Values.modelEvolution.training.type }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "rag-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-evolution
spec:
  schedule: {{ .Values.modelEvolution.training.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "rag-system.labels" . | nindent 12 }}
            app.kubernetes.io/component: model-evolution
        spec:
          serviceAccountName: {{ include "rag-system.fullname" . }}
          restartPolicy: OnFailure
          containers:
            - name: trainer
              image: "{{ .Values.global.imageRegistry | default "" }}{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
              command:
                - python
                - -m
                - proxy.app.model_evolution.trainer
              args:
                - --type
                - {{ .Values.modelEvolution.training.type }}
                - --epochs
                - {{ .Values.modelEvolution.training.maxEpochs }}
                - --batch-size
                - {{ .Values.modelEvolution.training.batchSize }}
                - --lr
                - {{ .Values.modelEvolution.training.learningRate }}
                - --lora-r
                - {{ .Values.modelEvolution.training.loraR }}
                - --lora-alpha
                - {{ .Values.modelEvolution.training.loraAlpha }}
                {{- if eq .Values.modelEvolution.training.useQLoRA "true" }}
                - --qlora
                {{- end }}
                {{- if eq .Values.modelEvolution.training.cpuOnly "true" }}
                - --cpu-only
                {{- end }}
              resources:
                {{- toYaml .Values.modelEvolution.training.resources | nindent 16 }}
{{- end }}
