{{- if .Values.federation.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-system.fullname" . }}-federation
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "rag-system.federationLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.federation.replicaCount }}
  selector:
    matchLabels:
      {{- include "rag-system.federationSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-system.federationLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rag-system.fullname" . }}
      securityContext:
        {{- toYaml .Values.federation.podSecurityContext | nindent 8 }}
      containers:
        - name: federation
          securityContext:
            {{- toYaml .Values.federation.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry | default "" }}{{ .Values.federation.image.repository }}:{{ .Values.federation.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.federation.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.federation.service.targetPort }}
              protocol: TCP
          env:
            - name: FEDERATION_MODE
              value: {{ .Values.federation.env.federationMode | quote }}
            - name: FEDERATION_MERGE_STRATEGY
              value: {{ .Values.federation.env.federationMergeStrategy | quote }}
            - name: FEDERATION_MERGE_K
              value: {{ .Values.federation.env.federationMergeK | quote }}
            - name: FEDERATION_RRF_K
              value: {{ .Values.federation.env.federationRrfK | quote }}
            - name: FEDERATION_PER_INSTANCE_TIMEOUT_S
              value: {{ .Values.federation.env.federationPerInstanceTimeoutS | quote }}
            - name: FEDERATION_TOTAL_TIMEOUT_S
              value: {{ .Values.federation.env.federationTotalTimeoutS | quote }}
            - name: FEDERATION_CIRCUIT_BREAKER_THRESHOLD
              value: {{ .Values.federation.env.federationCircuitBreakerThreshold | quote }}
            - name: FEDERATION_CIRCUIT_BREAKER_RECOVERY_S
              value: {{ .Values.federation.env.federationCircuitBreakerRecoveryS | quote }}
            - name: FEDERATION_AUTH_ENABLED
              value: {{ .Values.federation.env.federationAuthEnabled | quote }}
            - name: FEDERATION_DEFAULT_GROUPS
              value: {{ .Values.federation.env.federationDefaultGroups | quote }}
          livenessProbe:
            {{- toYaml .Values.federation.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.federation.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.federation.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-system.fullname" . }}-federation
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "rag-system.federationLabels" . | nindent 4 }}
spec:
  type: {{ .Values.federation.service.type }}
  ports:
    - port: {{ .Values.federation.service.port }}
      targetPort: {{ .Values.federation.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "rag-system.federationSelector" . | nindent 4 }}
{{- end }}
